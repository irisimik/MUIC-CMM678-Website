<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CM</title>
  <script src="/scripts/getAsset.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000000; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    
    body { background-color: #000000; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-gray-200">

  <div class="max-w-4xl mx-auto">
    <header class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-6">
      <div class="flex items-center">
        <img id="logoimg" src="logo.png" alt="Logo" class="w-10 h-auto hover:rotate-12 transition-transform">
        <h1 class="text-xl font-bold text-white ml-4 tracking-tight">Edit Activity</h1>
      </div>
      
      <div class="flex gap-2">
        <button onclick="showIconInstructions()" class="bg-zinc-900 hover:bg-zinc-800 text-purple-400 w-10 h-10 rounded-lg flex items-center justify-center border border-zinc-700 transition">
          i
        </button>
        <button onclick="addNewCard()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-lg shadow-blue-900/20">
          Add
        </button>
        <button onclick="exportJSON()" class="bg-white hover:bg-gray-200 text-black px-4 py-2 rounded-lg text-sm font-bold transition">
          Save
        </button>
      </div>
    </header>

    <div id="card-container" class="space-y-4">
      </div>
  </div>

  <template id="card-template">
    <div class="card-item bg-zinc-900 p-6 rounded-xl border border-zinc-800 group relative shadow-xl">
      <div class="ml-6">
        <div class="drag-handle absolute left-0 top-0 bottom-0 w-8 flex items-center justify-center cursor-grab active:cursor-grabbing text-zinc-700 hover:text-zinc-400">
          <i class="fa-solid fa-grip-vertical"></i>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <div>
            <label class="block text-xs font-bold uppercase text-zinc-500 mb-1">Title</label>
            <input type="text" class="field-title w-full bg-black border-zinc-800 border rounded p-2 text-white focus:ring-1 focus:ring-blue-500 outline-none transition" placeholder="Activity Title">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-zinc-500 mb-1">Category</label>
            <input type="text" class="field-category w-full bg-black border-zinc-800 border rounded p-2 text-white focus:ring-1 focus:ring-blue-500 outline-none transition" placeholder="T3">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-zinc-500 mb-1">C</label>
            <input type="text" class="field-badge w-full bg-black border-zinc-800 border rounded p-2 text-zinc-400 font-mono text-xs focus:ring-1 focus:ring-blue-500 outline-none transition" placeholder="bg-green-500">
          </div>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-bold uppercase text-zinc-500 mb-1">Description</label>
          <textarea class="field-description w-full bg-black border-zinc-800 border rounded p-2 h-20 text-white focus:ring-1 focus:ring-blue-500 outline-none transition resize-none" placeholder="Describe the activity..."></textarea>
        </div>

        <div class="border-t border-zinc-800 pt-4">
          <div class="flex justify-between items-center mb-3">
            <label class="block text-xs font-bold uppercase text-zinc-500">Buttons</label>
            <button onclick="addButton(this)" class="text-blue-400 hover:text-blue-300 text-xs font-bold transition">+ Add Button</button>
          </div>
          <div class="button-list space-y-2"></div>
        </div>

        <button onclick="removeCard(this)" class="absolute top-4 right-4 text-zinc-700 hover:text-red-500 transition">
          <i class="fa-solid fa-trash-can"></i>
        </button>
      </div>
    </div>
  </template>

  <template id="button-template">
    <div class="button-item flex flex-col md:flex-row gap-2 items-stretch md:items-start bg-zinc-950 p-3 md:p-2 rounded border border-zinc-800 shadow-inner relative">
      <div class="flex flex-col md:flex-row flex-1 gap-2">
        <div class="flex-1">
          <label class="block md:hidden text-[10px] font-bold uppercase text-zinc-600 mb-1">Label</label>
          <input type="text" class="btn-label w-full text-sm bg-black border-zinc-700 border p-1.5 rounded text-white" placeholder="Label">
        </div>
        <div class="flex-1">
          <label class="block md:hidden text-[10px] font-bold uppercase text-zinc-600 mb-1">URL</label>
          <input type="text" class="btn-url w-full text-sm bg-black border-zinc-700 border p-1.5 rounded text-white" placeholder="URL">
        </div>
        <div class="w-full md:w-28">
          <label class="block md:hidden text-[10px] font-bold uppercase text-zinc-600 mb-1">Icon</label>
          <input type="text" class="btn-icon w-full text-sm bg-black border-zinc-700 border p-1.5 rounded text-zinc-400 font-mono" placeholder="fa-icon">
        </div>
      </div>

      <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 md:relative md:top-0 md:right-0 text-zinc-600 hover:text-red-400 p-1.5">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
  </template>

  <script>
    let initialData = null;
    let password = null;

    const container = document.getElementById('card-container');

    new Sortable(container, {
      animation: 150,
      handle: '.drag-handle',
      ghostClass: 'opacity-30'
    });

    async function renderData() {
      if (!initialData) {
        
        password = prompt("Password", "");
        if (password === null) { window.location.reload(); }
        const res = await post("/api/update_board_psw_check", {"password": password});
        if (!res || !res.auth) {
          alert("Incorrect password");
          window.location.reload();
        }

        initialData = await getJSON("/boarddata.json");
      }
      container.innerHTML = '';
      initialData.forEach(item => {
        container.appendChild(createCardElement(item));
      });
    }

    function createCardElement(item = {}) {
      const temp = document.getElementById('card-template');
      const clone = temp.content.cloneNode(true);
      
      clone.querySelector('.field-title').value = item.title || '';
      clone.querySelector('.field-category').value = item.category || 'T3';
      clone.querySelector('.field-badge').value = item.badgeClass || 'bg-zinc-800 text-white';
      clone.querySelector('.field-description').value = item.description || '';

      const btnList = clone.querySelector('.button-list');
      if (item.buttons) {
        item.buttons.forEach(btn => {
          btnList.appendChild(createButtonElement(btn));
        });
      }
      return clone;
    }

    function createButtonElement(btn = {}) {
      const temp = document.getElementById('button-template');
      const clone = temp.content.cloneNode(true);
      clone.querySelector('.btn-label').value = btn.label || '';
      clone.querySelector('.btn-url').value = btn.url || '';
      clone.querySelector('.btn-icon').value = btn.icon || 'fa-link';
      return clone;
    }

    function addNewCard() {
      container.prepend(createCardElement());
    }

    function addButton(el) {
      const list = el.closest('.ml-6').querySelector('.button-list');
      list.appendChild(createButtonElement());
    }

    function removeCard(btn) {
      if(confirm('Confirm deletion?')) {
        btn.closest('.card-item').remove();
      }
    }

    function downloadJSON(data, filename = 'save.json') {
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    async function exportJSON() {
      const cards = document.querySelectorAll('.card-item');
      const result = Array.from(cards).map(card => {
        const buttons = Array.from(card.querySelectorAll('.button-item')).map(btn => ({
          label: btn.querySelector('.btn-label').value,
          icon: btn.querySelector('.btn-icon').value,
          url: btn.querySelector('.btn-url').value
        }));

        return {
          category: card.querySelector('.field-category').value,
          title: card.querySelector('.field-title').value,
          description: card.querySelector('.field-description').value,
          badgeClass: card.querySelector('.field-badge').value,
          buttons: buttons
        };
      });

      let jsstring = JSON.stringify(result, null, 2);
      try {
        let req = await post("/api/update_board", {
          "password": password,
          "newjson": jsstring
        });
        console.log(req);
        if (req === null) {
          alert("Failure: incorrect password!");
          downloadJSON(jsstring);
        } else {
          alert("Saved!");
        }
      } catch(e) {
        alert("Request failed. Downloading backup.");
        downloadJSON(jsstring);
      }
    }

    function showIconInstructions() {
      window.open("https://fontawesome.com/search?ic=free-collection", "_blank");
    }

    renderData();
  </script>
</body>
</html>
