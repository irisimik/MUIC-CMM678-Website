<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QR Code Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 40px auto;
      text-align: center;
      align-items: center;
      align-content: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 3rem;
    }

    button {
      padding: 10px 16px;
      font-size: 2rem;
      cursor: pointer;
      margin: 5px;
    }

    #qrcode {
      margin-top: 20px;
    }
    .hide {
      display: none;
    }
  </style>
</head>
<body>

  <h2></h2>

  <input id="text" type="text" placeholder="Type smth" />
  <br/>

  <button onclick="generateQR()">Generate QR</button>
  <button onclick="downloadQR()" class="hide" id="downbut">Download</button>
  <p id="out">RAW : </p>

  <div id="qrcode"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>
    let qr;

    function generateQR() {
      const text = document.getElementById("text").value.trim();
      if (!text) return;

      const container = document.getElementById("qrcode");
      container.innerHTML = "";

      document.getElementById("downbut").classList = [];

      document.getElementById("out").innerText = "RAW : "+text;

      

      qr = new QRCode(container, {
        text: text,
        width: 200,
        height: 200,
      });
    }

    function downloadQR() {
      const canvas = document.querySelector("#qrcode canvas");
      if (!canvas) return;
      
      const url = canvas.toDataURL("image/png");
      const a = document.createElement("a");
      a.href = url;
      a.download = "qr-code.png";
      a.click();
    }
  </script>

</body>
</html>
